name: TGSpeechBox
options:
  bundleIdPrefix: com.tgspeechbox
  deploymentTarget:
    macOS: "13.0"
    iOS: "16.0"
  xcodeVersion: "26.2"

settings:
  base:
    SWIFT_VERSION: "5"
    CLANG_CXX_LANGUAGE_STANDARD: c++17
    DEVELOPMENT_TEAM: P84QQE42U9
    CODE_SIGN_STYLE: Automatic

targets:
  # ── macOS ──────────────────────────────────────────────

  TGSpeechBox-macOS:
    type: application
    platform: macOS
    sources:
      - path: TGSpeechBox
        type: group
      - path: Bridge
        type: group
      - path: Resources/espeak-ng-data
        type: folder
        buildPhase: resources
      - path: Resources/packs
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tgspeechbox.app
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_NAME: TGSpeechBox
        INFOPLIST_KEY_CFBundleDisplayName: TGSpeechBox
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "3"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        SWIFT_OBJC_BRIDGING_HEADER: Bridge/BridgingHeader.h
        CODE_SIGN_ENTITLEMENTS: TGSpeechBox/TGSpeechBox.entitlements
        HEADER_SEARCH_PATHS:
          - $(PROJECT_DIR)/../espeak_phonemizer
          - $(PROJECT_DIR)/../../espeak-ng/src/include
          - $(PROJECT_DIR)/../../tgspeechbox/src
          - $(PROJECT_DIR)/../../tgspeechbox/src/frontend
        LIBRARY_SEARCH_PATHS:
          - $(PROJECT_DIR)/../build-desktop/tgsb_static
          - $(PROJECT_DIR)/../build-desktop/espeak_phonemizer
          - $(PROJECT_DIR)/../build-desktop/ucd-tools
        OTHER_LDFLAGS:
          - -ltgspeechbox_static
          - -ltgsbFrontend_static
          - -lespeak_phonemizer
          - -lucd
          - -lc++
          - -lm
    dependencies:
      - target: TGSpeechBoxSynthExtension
        embed: true
        codeSign: true
      - target: TGSBPhonemizerService
        embed: true
        codeSign: true

  TGSpeechBoxSynthExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: TGSpeechBoxSynthExtension
        type: group
      - path: Bridge
        type: group
      - path: Resources/espeak-ng-data
        type: folder
        buildPhase: resources
      - path: Resources/packs
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tgspeechbox.app.synth-extension
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: TGSpeechBoxSynthExtension/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "3"
        SWIFT_OBJC_BRIDGING_HEADER: Bridge/BridgingHeader.h
        CODE_SIGN_ENTITLEMENTS: TGSpeechBoxSynthExtension/TGSpeechBoxSynthExtension.entitlements
        HEADER_SEARCH_PATHS:
          - $(PROJECT_DIR)/../espeak_phonemizer
          - $(PROJECT_DIR)/../../espeak-ng/src/include
          - $(PROJECT_DIR)/../../tgspeechbox/src
          - $(PROJECT_DIR)/../../tgspeechbox/src/frontend
        LIBRARY_SEARCH_PATHS:
          - $(PROJECT_DIR)/../build-desktop/tgsb_static
          - $(PROJECT_DIR)/../build-desktop/espeak_phonemizer
          - $(PROJECT_DIR)/../build-desktop/ucd-tools
        OTHER_LDFLAGS:
          - -ltgspeechbox_static
          - -ltgsbFrontend_static
          - -lespeak_phonemizer
          - -lucd
          - -lc++
          - -lm

  TGSBPhonemizerService:
    type: xpc-service
    platform: macOS
    sources:
      - path: TGSBPhonemizerService
        type: group
      - path: Resources/espeak-ng-data
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tgspeechbox.app.phonemizer
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "3"
        CODE_SIGN_ENTITLEMENTS: TGSBPhonemizerService/TGSBPhonemizerService.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: TGSBPhonemizerService/PhonemizerBridgingHeader.h
        HEADER_SEARCH_PATHS:
          - $(PROJECT_DIR)/../espeak_phonemizer
          - $(PROJECT_DIR)/../../espeak-ng/src/include
        LIBRARY_SEARCH_PATHS:
          - $(PROJECT_DIR)/../build-desktop/espeak_phonemizer
          - $(PROJECT_DIR)/../build-desktop/ucd-tools
        OTHER_LDFLAGS:
          - -lespeak_phonemizer
          - -lucd
          - -lc++
          - -lm

  # ── iOS ────────────────────────────────────────────────

  TGSpeechBox-iOS:
    type: application
    platform: iOS
    sources:
      - path: TGSpeechBox
        type: group
      - path: Bridge
        type: group
      - path: Resources/espeak-ng-data
        type: folder
        buildPhase: resources
      - path: Resources/packs
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tgspeechbox.app
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_NAME: TGSpeechBox
        INFOPLIST_KEY_CFBundleDisplayName: TGSpeechBox
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "3"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SWIFT_OBJC_BRIDGING_HEADER: Bridge/BridgingHeader.h
        CODE_SIGN_ENTITLEMENTS: TGSpeechBox/TGSpeechBox-iOS.entitlements
        HEADER_SEARCH_PATHS:
          - $(PROJECT_DIR)/../espeak_phonemizer
          - $(PROJECT_DIR)/../../espeak-ng/src/include
          - $(PROJECT_DIR)/../../tgspeechbox/src
          - $(PROJECT_DIR)/../../tgspeechbox/src/frontend
        LIBRARY_SEARCH_PATHS:
          - $(PROJECT_DIR)/../build-ios/tgsb_static/MinSizeRel-iphoneos
          - $(PROJECT_DIR)/../build-ios/espeak_phonemizer/MinSizeRel-iphoneos
          - $(PROJECT_DIR)/../build-ios/ucd-tools/MinSizeRel-iphoneos
        OTHER_LDFLAGS:
          - -ltgspeechbox_static
          - -ltgsbFrontend_static
          - -lespeak_phonemizer
          - -lucd
          - -lc++
          - -lm
    dependencies:
      - target: TGSpeechBoxSynthExtension-iOS
        embed: true
        codeSign: true

  TGSpeechBoxSynthExtension-iOS:
    type: app-extension
    platform: iOS
    sources:
      - path: TGSpeechBoxSynthExtension
        type: group
      - path: Bridge
        type: group
      - path: Resources/espeak-ng-data
        type: folder
        buildPhase: resources
      - path: Resources/packs
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tgspeechbox.app.synth-extension
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: TGSpeechBoxSynthExtension/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: Bridge/BridgingHeader.h
        CODE_SIGN_ENTITLEMENTS: TGSpeechBoxSynthExtension/TGSpeechBoxSynthExtension-iOS.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "3"
        HEADER_SEARCH_PATHS:
          - $(PROJECT_DIR)/../espeak_phonemizer
          - $(PROJECT_DIR)/../../espeak-ng/src/include
          - $(PROJECT_DIR)/../../tgspeechbox/src
          - $(PROJECT_DIR)/../../tgspeechbox/src/frontend
        LIBRARY_SEARCH_PATHS:
          - $(PROJECT_DIR)/../build-ios/tgsb_static/MinSizeRel-iphoneos
          - $(PROJECT_DIR)/../build-ios/espeak_phonemizer/MinSizeRel-iphoneos
          - $(PROJECT_DIR)/../build-ios/ucd-tools/MinSizeRel-iphoneos
        OTHER_LDFLAGS:
          - -ltgspeechbox_static
          - -ltgsbFrontend_static
          - -lespeak_phonemizer
          - -lucd
          - -lc++
          - -lm
