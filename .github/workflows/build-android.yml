name: Compilar APK de Android

on:
  workflow_dispatch:

jobs:
  build-apk:
    name: Ensamblar APK
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código de TGSpeechBox
      - name: Descargar repositorio TGSpeechBox
        uses: actions/checkout@v4
        with:
          path: TGSpeechBox

      # 2. Descargar el motor eSpeak-NG (necesario para el código C++)
      - name: Descargar motor eSpeak-NG
        uses: actions/checkout@v4
        with:
          repository: espeak-ng/espeak-ng
          path: espeak-ng

      # 3. Configurar Java 17
      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4. PASO NUEVO: Crear archivo de firma falso para evitar el error
      # Esto genera el archivo signing.properties que falta, con datos de relleno.
      - name: Crear archivo de firma temporal
        run: |
          cd TGSpeechBox/src/platforms/android
          # Crear un archivo de claves vacío para que Gradle lo encuentre
          touch debug.keystore
          # Crear el archivo de propiedades apuntando al archivo vacío
          echo "STORE_FILE=debug.keystore" > signing.properties
          echo "STORE_PASSWORD=android" >> signing.properties
          echo "KEY_ALIAS=androiddebugkey" >> signing.properties
          echo "KEY_PASSWORD=android" >> signing.properties

      # 5. Compilar el APK usando Gradle
      - name: Compilar APK con Gradle
        run: |
          cd TGSpeechBox/src/platforms/android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      # 6. Subir el APK final
      - name: Subir APK final
        uses: actions/upload-artifact@v4
        with:
          name: TGSpeechBox-APK
          path: TGSpeechBox/src/platforms/android/app/build/outputs/apk/debug/app-debug.apk
