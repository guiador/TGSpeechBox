
name: Compilar APK de Android

# Esto permite que ejecutemos el proceso manualmente con un botón
on:
  workflow_dispatch:

jobs:
  build-apk:
    name: Ensamblar APK
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código de TGSpeechBox en su propia carpeta
      - name: Descargar repositorio TGSpeechBox
        uses: actions/checkout@v4
        with:
          path: TGSpeechBox

      # 2. Descargar el motor eSpeak-NG exactamente donde el código lo requiere
      - name: Descargar motor eSpeak-NG
        uses: actions/checkout@v4
        with:
          repository: espeak-ng/espeak-ng
          path: espeak-ng

      # 3. Configurar Java 17 (Requisito del proyecto)
      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4. Compilar el APK usando Gradle
      - name: Compilar APK con Gradle
        run: |
          cd TGSpeechBox/src/platforms/android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 5. Subir el APK final para que lo puedas descargar
      - name: Subir APK final
        uses: actions/upload-artifact@v4
        with:
          name: TGSpeechBox-APK
          path: TGSpeechBox/src/platforms/android/app/build/outputs/apk/debug/app-debug.apk
